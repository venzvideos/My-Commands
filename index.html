<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Command Vault</title>
    <style>
        /* 1. Global Reset & Body Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000000;
            color: #00FF00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. Login Screen Terminal Box */
        .login-screen {
            background-color: #050505;
            border: 2px solid #00FF00;
            border-radius: 10px;
            padding: 40px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        /* 3. Restricted Header & Icon Styling */
        .lock-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        /* 4. Password Input Field */
        .input-field {
            width: 100%;
            padding: 12px;
            background-color: #101010;
            border: 1px solid #333333;
            border-radius: 5px;
            color: #00FF00;
            font-family: inherit;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 15px;
        }
        .input-field:focus {
            border-color: #00FF00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        /* 5. Error Feedback Message */
        .error-msg {
            color: #FF3333;
            font-size: 0.9rem;
            height: 20px;
            margin-bottom: 15px;
            font-weight: bold;
            visibility: hidden; /* Hidden by default, toggled via JS */
        }

        /* 6. Authenticate Action Button */
        .btn-authenticate {
            background-color: transparent;
            color: #00FF00;
            border: 1px solid #00FF00;
            padding: 10px 25px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .btn-authenticate:hover {
            background-color: #00FF00;
            color: #000000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
        }

        /* 7. Bottom Footnote Layout */
        .credits {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #555555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Main Interface Terminal Screen Container -->
    <div class="login-screen">
        
        <!-- Security Header Information -->
        <div class="lock-icon">🔐</div>
        <div class="login-title">ACCESS RESTRICTED</div>
        
        <!-- Interactive Passkey Entry Components -->
        <input 
            type="password" 
            id="passkey" 
            class="input-field" 
            placeholder="•••" 
            maxlength="3"
            onkeypress="handleKeyPress(event)"
        >
        
        <!-- Live System Validation Warnings -->
        <div id="error-msg" class="error-msg">INVALID PASSKEY. ACCESS DENIED.</div>
        
        <!-- Manual Submission Interface Button -->
        <button class="btn-authenticate" onclick="validatePasskey()">Authenticate</button>
        
        <!-- Author Asset Sign-off Tag -->
        <div class="credits">Created by Simon Amadeus</div>
    </div>

    <!-- JavaScript Interactive Authentication Layer -->
    <script>
        // Updated system password
        const CORRECT_PASSKEY = "123";

        // Listen for the "Enter" keyboard button mapping action
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                validatePasskey();
            }
        }

        // Central processing engine for passkey string inspection
        function validatePasskey() {
            const inputField = document.getElementById("passkey");
            const errorDisplay = document.getElementById("error-msg");
            
            // Extract the user value string
            const userInput = inputField.value;

            if (userInput === CORRECT_PASSKEY) {
                // SUCCESS LOGIC PATHWAY
                errorDisplay.style.visibility = "hidden";
                alert("ACCESS GRANTED. Opening the Matrix Command Vault...");
                
                // Optional Project Destination: Place redirection target here if required
                // window.location.href = "vault-dashboard.html";
                
            } else {
                // FAILURE LOGIC PATHWAY
                errorDisplay.style.visibility = "visible";
                inputField.value = ""; // Empty string sequence input clear
                inputField.focus();    // Reset interface typing anchor state
            }
        }
    </script>

</body>
</html>
