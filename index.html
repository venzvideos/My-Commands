<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Command Vault</title>
    <style>
        :root {
            --bg-dark: #080b10;
            --panel-bg: #11161d;
            --box-bg: #1a202c;
            --border-color: #262c36;
            
            /* Neon Aesthetic Glow Theme */
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --text-main: #adc1d6;
            --text-bold: #ffffff;
            --text-muted: #62768c;
            
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 240, 255, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(189, 0, 255, 0.03) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 780px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .author-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-purple);
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(189, 0, 255, 0.4);
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            margin: 0;
            color: var(--text-bold);
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .section-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 26px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Ambient subtle card highlight */
        .section-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-hover), transparent);
        }

        .section-header {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-bold);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
        }

        .cmd-container-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--box-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px 22px;
            margin-bottom: 16px;
            gap: 20px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .cmd-container-box:hover {
            border-color: rgba(0, 240, 255, 0.3);
            background-color: #1e2533;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.05);
        }

        .cmd-container-box:last-child {
            margin-bottom: 0;
        }

        .cmd-string {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--neon-blue);
            white-space: pre-wrap;
            word-break: break-all;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.15);
        }

        /* Aesthetic Glowing Button Base */
        .action-copy-btn {
            background-color: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 9px 18px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1), inset 0 0 5px rgba(0, 240, 255, 0.05);
        }

        /* Button Hover Glowing Effect */
        .action-copy-btn:hover {
            color: #000000;
            background-color: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            transform: translateY(-1px);
        }

        /* Button Active/Click State */
        .action-copy-btn:active {
            transform: translateY(1px);
        }

        /* Success Glowing State (When Copied) */
        .action-copy-btn.success-state {
            background-color: var(--neon-purple);
            border-color: var(--neon-purple);
            color: #ffffff;
            box-shadow: 0 0 25px rgba(189, 0, 255, 0.8);
        }

        /* Centered minimal toast popup */
        .notification-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background-color: #12131a;
            color: #ffffff;
            border: 1px solid var(--neon-purple);
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 0 25px rgba(189, 0, 255, 0.3);
            opacity: 0;
            visibility: hidden;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s ease;
            z-index: 1000;
        }

        .notification-toast.active-state {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="author-tag">Created by Vince Amigo</div>
        <h1>Command Accessor</h1>
    </header>

    <!-- [SECTION: DART] -->
    <div class="section-card">
        <div class="section-header">[SECTION: DART]</div>
        <div class="cmd-container-box">
            <div class="cmd-string">dart run bin/main.dart && dart format .</div>
            <button class="action-copy-btn" onclick="executeCopy(this, 'dart run bin/main.dart && dart format .')">Copy</button>
        </div>
    </div>

    <!-- [SECTION: FLUTTER] -->
    <div class="section-card">
        <div class="section-header">[SECTION: FLUTTER]</div>
        <div class="cmd-container-box">
            <div class="cmd-string">cd C:\Users\user\Documents\flutter_file\vince_proj</div>
            <button class="action-copy-btn" onclick="executeCopy(this, 'cd C:\\Users\\user\\Documents\\flutter_file\\vince_proj')">Copy</button>
        </div>
        <div class="cmd-container-box">
            <div class="cmd-string">flutter run</div>
            <button class="action-copy-btn" onclick="executeCopy(this, 'flutter run')">Copy</button>
        </div>
    </div>
</div>

<!-- Center-bottom floating notification toast -->
<div id="toastNotification" class="notification-toast">SYSTEM COMMAND PIPED TO CLIPBOARD</div>

<script>
    function executeCopy(buttonElement, rawText) {
        navigator.clipboard.writeText(rawText).then(() => {
            const initialLabel = buttonElement.innerText;
            buttonElement.innerText = 'Copied';
            buttonElement.classList.add('success-state');
            
            const toast = document.getElementById('toastNotification');
            toast.classList.add('active-state');

            setTimeout(() => {
                buttonElement.innerText = initialLabel;
                buttonElement.classList.remove('success-state');
                toast.classList.remove('active-state');
            }, 1800);
        }).catch(err => {
            console.error('Clipboard execution error: ', err);
        });
    }
</script>

</body>
</html>
