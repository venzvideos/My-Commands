<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Command Vault</title>
    <style>
        /* Global Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000000;
            color: #00FF00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Screen Frame Box */
        .login-screen {
            background-color: #050505;
            border: 2px solid #00FF00;
            border-radius: 10px;
            padding: 40px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            display: block; 
        }
        .lock-icon { font-size: 2rem; margin-bottom: 15px; }
        .login-title { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 30px; }
        .input-field {
            width: 100%;
            padding: 12px;
            background-color: #101010;
            border: 1px solid #333333;
            border-radius: 5px;
            color: #00FF00;
            font-family: inherit;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            margin-bottom: 15px;
        }
        .error-msg { color: #FF3333; font-size: 0.9rem; height: 20px; margin-bottom: 15px; font-weight: bold; visibility: hidden; }
        .btn-authenticate {
            background-color: transparent;
            color: #00FF00;
            border: 1px solid #00FF00;
            padding: 10px 25px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
        }

        /* Interactive Command Terminal System */
        .terminal-dashboard {
            display: none; 
            width: 85vw;
            height: 85vh;
            background-color: #050505;
            border: 2px solid #00FF00;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.15);
            flex-direction: column;
        }
        .terminal-history {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* Logged Outputs & Code Blocks */
        .log-entry { margin-bottom: 12px; white-space: pre-wrap; }
        .code-snippet-box {
            background-color: #111;
            border: 1px dashed #00FF00;
            padding: 12px;
            border-radius: 4px;
            margin-top: 5px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .code-text { font-family: inherit; color: #ffffff; white-space: pre-wrap; word-break: break-all; }
        .btn-copy {
            background: #00FF00;
            color: #000;
            border: none;
            padding: 4px 10px;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            margin-left: 15px;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .btn-copy:hover { background: #00cc00; }

        /* Command Line Input Wrapper */
        .terminal-input-row { display: flex; align-items: center; border-top: 1px solid #222; padding-top: 10px; }
        .terminal-prompt { color: #00FF00; font-weight: bold; margin-right: 10px; user-select: none; }
        .cmd-input { flex-grow: 1; background: transparent; border: none; outline: none; color: #00FF00; font-family: inherit; font-size: 1rem; }
        .credits { margin-top: 40px; font-size: 0.75rem; color: #555; }
    </style>
</head>
<body>

    <!-- SECTION 1: Login Box UI -->
    <div id="login-box" class="login-screen">
        <div class="lock-icon">🔐</div>
        <div class="login-title">ACCESS RESTRICTED</div>
        <input type="password" id="passkey" class="input-field" placeholder="•••" maxlength="3" onkeypress="handleKeyPress(event)">
        <div id="error-msg" class="error-msg">INVALID PASSKEY. ACCESS DENIED.</div>
        <button class="btn-authenticate" onclick="validatePasskey()">Authenticate</button>
        <div class="credits">Created by Simon Amadeus</div>
    </div>

    <!-- SECTION 2: Command Terminal Area -->
    <div id="dashboard-box" class="terminal-dashboard">
        <div id="history" class="terminal-history">MATRIX DEV TERMINAL v1.0.0
Type "help" to view custom automation commands.

</div>
        <div class="terminal-input-row">
            <span class="terminal-prompt">simon@vault:~$</span>
            <input type="text" id="cmd" class="cmd-input" placeholder="Enter command..." onkeypress="handleCommandPress(event)" autofocus>
        </div>
    </div>

    <script>
        const CORRECT_PASSKEY = "123";

        function handleKeyPress(event) { if (event.key === "Enter") validatePasskey(); }

        function validatePasskey() {
            const inputField = document.getElementById("passkey");
            const errorDisplay = document.getElementById("error-msg");
            if (inputField.value === CORRECT_PASSKEY) {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("dashboard-box").style.display = "flex";
                document.getElementById("cmd").focus();
            } else {
                errorDisplay.style.visibility = "visible";
                inputField.value = "";
                inputField.focus();
            }
        }

        // Central Logic Hook for Terminal Input Commands
        function handleCommandPress(event) {
            if (event.key === "Enter") {
                const cmdInput = document.getElementById("cmd");
                const history = document.getElementById("history");
                const rawCommand = cmdInput.value.trim();
                const command = rawCommand.toLowerCase();

                if (rawCommand === "") return;

                // 1. Output the current raw terminal prompt line
                const promptLine = document.createElement('div');
                promptLine.className = 'log-entry';
                promptLine.innerText = `simon@vault:~$ ${rawCommand}`;
                history.appendChild(promptLine);

                // 2. Custom Command Processing Router
                if (command === "help") {
                    appendOutputText(history, `Available Commands:\n - dart-run : Print copyable directory setup and Dart run scripts.\n - clear    : Flush the screen memory layout.\n`);
                } 
                else if (command === "dart-run") {
                    appendOutputText(history, `Preparing repository targets... Built command chains successfully:`);
                    
                    // Create an interactive code snippet card block with a separate unique Copy feature!
                    appendCodeBox(history, `cd my_project && dart run bin/main.dart`);
                } 
                else if (command === "clear") {
                    history.innerHTML = "";
                } 
                else {
                    appendOutputText(history, `Error: Unknown system routing command "${rawCommand}". Type "help" for a list of system hooks.`);
                }

                // Auto Scroll Screen Frame Anchor State
                cmdInput.value = "";
                history.scrollTop = history.scrollHeight;
            }
        }

        // Helper: Inject plain text response blocks into logs
        function appendOutputText(parent, text) {
            const el = document.createElement('div');
            el.className = 'log-entry';
            el.innerText = text;
            parent.appendChild(el);
        }

        // Helper: Build a specialized script component structure with clipboard functions
        function appendCodeBox(parent, codeString) {
            const box = document.createElement('div');
            box.className = 'code-snippet-box';

            const txt = document.createElement('span');
            txt.className = 'code-text';
            txt.innerText = codeString;

            const btn = document.createElement('button');
            btn.className = 'btn-copy';
            btn.innerText = 'Copy';
            
            // Clipboard interface interaction hook
            btn.onclick = function() {
                navigator.clipboard.writeText(codeString).then(() => {
                    btn.innerText = 'Copied!';
                    btn.style.background = '#ffffff';
                    setTimeout(() => {
                        btn.innerText = 'Copy';
                        btn.style.background = '#00FF00';
                    }, 1500);
                });
            };

            box.appendChild(txt);
            box.appendChild(btn);
            parent.appendChild(box);
        }
    </script>
</body>
</html>
