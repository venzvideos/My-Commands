<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Command Vault</title>
    <style>
        /* 1. Global Reset & Body Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000000;
            color: #00FF00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. Login Screen Terminal Box */
        .login-screen {
            background-color: #050505;
            border: 2px solid #00FF00;
            border-radius: 10px;
            padding: 40px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            display: block; /* Toggled by JS */
        }

        /* 3. Restricted Header & Icon Styling */
        .lock-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        /* 4. Password Input Field */
        .input-field {
            width: 100%;
            padding: 12px;
            background-color: #101010;
            border: 1px solid #333333;
            border-radius: 5px;
            color: #00FF00;
            font-family: inherit;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 15px;
        }
        .input-field:focus {
            border-color: #00FF00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        /* 5. Error Feedback Message */
        .error-msg {
            color: #FF3333;
            font-size: 0.9rem;
            height: 20px;
            margin-bottom: 15px;
            font-weight: bold;
            visibility: hidden;
        }

        /* 6. Authenticate Action Button */
        .btn-authenticate {
            background-color: transparent;
            color: #00FF00;
            border: 1px solid #00FF00;
            padding: 10px 25px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .btn-authenticate:hover {
            background-color: #00FF00;
            color: #000000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
        }

        /* 7. The Command Line Dashboard System */
        .terminal-dashboard {
            display: none; /* Hidden until passkey is correct */
            width: 80vw;
            height: 80vh;
            background-color: #050505;
            border: 2px solid #00FF00;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.15);
            flex-direction: column;
        }
        .terminal-history {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 1rem;
            line-height: 1.4;
            white-space: pre-wrap;
            padding-right: 10px;
        }
        .terminal-input-row {
            display: flex;
            align-items: center;
            border-top: 1px solid #222222;
            padding-top: 10px;
        }
        .terminal-prompt {
            color: #00FF00;
            font-weight: bold;
            margin-right: 10px;
            user-select: none;
        }
        .cmd-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #00FF00;
            font-family: inherit;
            font-size: 1rem;
        }

        /* Scrollbar styles for dashboard */
        .terminal-history::-webkit-scrollbar { width: 6px; }
        .terminal-history::-webkit-scrollbar-thumb { background: #00FF00; border-radius: 3px; }

        .credits {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #555555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- SECTION 1: Login Screen Box -->
    <div id="login-box" class="login-screen">
        <div class="lock-icon">🔐</div>
        <div class="login-title">ACCESS RESTRICTED</div>
        
        <input 
            type="password" 
            id="passkey" 
            class="input-field" 
            placeholder="•••" 
            maxlength="3"
            onkeypress="handleKeyPress(event)"
            autocomplete="current-password"
        >
        
        <div id="error-msg" class="error-msg">INVALID PASSKEY. ACCESS DENIED.</div>
        <button class="btn-authenticate" onclick="validatePasskey()">Authenticate</button>
        <div class="credits">Created by Simon Amadeus</div>
    </div>

    <!-- SECTION 2: Interactive Commands Terminal Dashboard -->
    <div id="dashboard-box" class="terminal-dashboard">
        <div id="history" class="terminal-history">MATRIX COMMAND VAULT v1.0.0
Type "help" to see available terminal logs and subroutines.

</div>
        <div class="terminal-input-row">
            <span class="terminal-prompt">simon@vault:~$</span>
            <input type="text" id="cmd" class="cmd-input" placeholder="Enter command..." onkeypress="handleCommandPress(event)" autofocus>
        </div>
    </div>

    <!-- JavaScript Core Processing Layer -->
    <script>
        const CORRECT_PASSKEY = "123";

        // Handle login field entry
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                validatePasskey();
            }
        }

        // Validate the passkey structure
        function validatePasskey() {
            const inputField = document.getElementById("passkey");
            const errorDisplay = document.getElementById("error-msg");
            
            if (inputField.value === CORRECT_PASSKEY) {
                // Hide Auth interface & Unveil Custom Panel
                document.getElementById("login-box").style.display = "none";
                document.getElementById("dashboard-box").style.display = "flex";
                document.getElementById("cmd").focus();
            } else {
                errorDisplay.style.visibility = "visible";
                inputField.value = "";
                inputField.focus();
            }
        }

        // Handle command console logic
        function handleCommandPress(event) {
            if (event.key === "Enter") {
                const cmdInput = document.getElementById("cmd");
                const history = document.getElementById("history");
                const rawCommand = cmdInput.value.trim();
                const command = rawCommand.toLowerCase();

                if (rawCommand === "") return;

                // Log user entry to view
                history.innerText += `simon@vault:~$ ${rawCommand}\n`;

                // Custom Command Processing Matrix
                if (command === "help") {
                    history.innerText += `Available Subroutines:\n - help    : View command listings\n - status  : Inspect mainframe system levels\n - clear   : Clean screen history matrix\n - system  : Output author asset verification tags\n\n`;
                } else if (command === "status") {
                    history.innerText += `SYSTEM LEVEL: SECURE\nFirewall: ACTIVE\nVault Decryption status: 100%\n\n`;
                } else if (command === "system") {
                    history.innerText += `System Core Core: Simon Amadeus Architecture\nEngine Interface Build: HTML5 / CSS3 / ES6 Engine\n\n`;
                } else if (command === "clear") {
                    history.innerText = "";
                } else {
                    history.innerText += `Error: Unknown system routing command "${rawCommand}". Type "help" for a list of system hooks.\n\n`;
                }

                // Autoscroll terminal wrapper to base layout anchor
                cmdInput.value = "";
                history.scrollTop = history.scrollHeight;
            }
        }
    </script>

</body>
</html>
